services:
  backend:
    image: "${BACKEND_IMAGE:-ghcr.io/tao-t356/flux-springboot-backend:2.0.9-beta}"
    container_name: springboot-backend
    restart: unless-stopped
    environment:
      DB_PATH: /app/data/gost.db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_DAYS: "${JWT_EXPIRE_DAYS:-7}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-*}"
      FLUX_PANEL_VERSION: "${FLUX_PANEL_VERSION:-2.0.9-beta}"
      FLUX_PANEL_REPO: "${FLUX_PANEL_REPO:-tao-t356/flux}"
      FLUX_GITHUB_PROXY: "${FLUX_GITHUB_PROXY:-}"
      FLUX_PANEL_ACCESS_HOST: "${FLUX_PANEL_ACCESS_HOST:-}"
      BACKEND_PORT: "${BACKEND_PORT:-6365}"
      FLUX_FORCE_SECURE_NODE_TRANSPORT: "${FLUX_FORCE_SECURE_NODE_TRANSPORT:-false}"
      LOGIN_MAX_ATTEMPTS: "${LOGIN_MAX_ATTEMPTS:-5}"
      LOGIN_WINDOW_SECONDS: "${LOGIN_WINDOW_SECONDS:-300}"
      LOGIN_LOCK_SECONDS: "${LOGIN_LOCK_SECONDS:-900}"
      LOG_DIR: /app/logs
      JAVA_OPTS: "${JAVA_OPTS:--Xms128m -Xmx384m -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai}"
    ports:
      - "${BACKEND_PORT}:6365"
    volumes:
      - backend_logs:/app/logs
      - sqlite_data:/app/data
    networks:
      - gost-network
    stop_grace_period: 30s
    stop_signal: SIGTERM
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:6365/flow/test || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    image: "${FRONTEND_IMAGE:-ghcr.io/tao-t356/flux-vite-frontend:2.0.9-beta}"
    container_name: vite-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gost-network


volumes:
  sqlite_data:
    name: sqlite_data
    driver: local
  backend_logs:
    name: backend_logs
    driver: local


networks:
  gost-network:
    name: gost-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
